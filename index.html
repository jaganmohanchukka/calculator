<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/calculator.css">

</head>
<body>
    <div class="outer">
        <div class="box" id="result"></div>
        <div class="box" id="ac">AC</div>
        <div class="box" id="c">C</div>
        <div class="box" id="sign">+/-</div>
        <div class="box" id="division">/</div>
        <div class="box" id="a7">7</div>
        <div class="box" id="a8">8</div>
        <div class="box" id="a9">9</div>
        <div class="box" id="multiplication">*</div>
        <div class="box" id="a4">4</div>
        <div class="box" id="a5">5</div>
        <div class="box" id="a6">6</div>
        <div class="box" id="subtraction">-</div>
        <div class="box" id="a1">1</div>
        <div class="box" id="a2">2</div>
        <div class="box" id="a3">3</div>
        <div class="box" id="addition">+</div>
        <div class="box" id="aa">%</div>
        <div class="box" id="a0">0</div>
        <div class="box" id="point">.</div>
        <div class="box" id="equalto">=</div>
    </div>
    <script src="/calculator.js"></script>
</body>
</html>
